name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # A tag that can't build or pass its own tests should not become a release.
      - name: Verify the tagged commit
        run: |
          pip install pytest ruff numpy soundfile openai fastapi httpx python-multipart
          ruff check .
          pytest

      - name: Create the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Voxa $GITHUB_REF_NAME" \
            --notes "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md) for the full list of changes." \
            --generate-notes

  pypi:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Trusted Publishing: PyPI verifies this workflow's identity, so no API token
      # is stored in the repository. Configure the publisher once at
      # https://pypi.org/manage/project/voxa-dub/settings/publishing/
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the distribution
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check the metadata renders on PyPI
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - uses: pypa/gh-action-pypi-publish@release/v1

  docker:
    name: Publish the container image
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ghcr.io requires a lowercase image name; the repository is akshinmrv/Voxa.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/akshinmrv/voxa
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
