name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The heavy runtime deps (torch/whisper/ffmpeg) are NOT installed here:
      # autodub guards those imports so the pure logic can be unit-tested cheaply.
      - name: Install test tooling
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Syntax check
        run: python -m py_compile autodub.py

      - name: Run unit tests
        run: pytest
